name: Scheduled Database Backups

on:
  schedule:
    # Daily backup
    - cron: "30 2 * * *"
    # Weekly backup
    - cron: "45 2 * * 0"
    # Monthly backup
    - cron: "0 3 1 * *"
  workflow_dispatch:
    inputs:
      cadence:
        description: "Backup cadence"
        required: true
        default: "manual"
        type: choice
        options:
          - manual
          - daily
          - weekly
          - monthly

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve cadence and retention
        id: cadence
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            cadence="${{ github.event.inputs.cadence }}"
          else
            case "${{ github.event.schedule }}" in
              "30 2 * * *") cadence="daily" ;;
              "45 2 * * 0") cadence="weekly" ;;
              "0 3 1 * *") cadence="monthly" ;;
              *) cadence="manual" ;;
            esac
          fi
          case "$cadence" in
            daily) retention=14 ;;
            weekly) retention=60 ;;
            monthly) retention=90 ;;
            *) retention=30 ;;
          esac
          echo "cadence=$cadence" >> "$GITHUB_OUTPUT"
          echo "retention=$retention" >> "$GITHUB_OUTPUT"

      - name: Run backup script
        env:
          DATABASE_URL: ${{ secrets.BACKUP_DATABASE_URL }}
          BACKUP_ENCRYPTION_PASSPHRASE: ${{ secrets.BACKUP_ENCRYPTION_PASSPHRASE }}
          BACKUP_CADENCE: ${{ steps.cadence.outputs.cadence }}
          USE_DOCKER_PG_DUMP: "true"
          PG_DUMP_IMAGE_TAG: "17"
          BACKUP_OUTPUT_DIR: backup-output
        run: bash scripts/backup-postgres.sh

      - name: Upload backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: db-backup-${{ steps.cadence.outputs.cadence }}-${{ github.run_id }}
          path: backup-output/*
          retention-days: ${{ steps.cadence.outputs.retention }}
